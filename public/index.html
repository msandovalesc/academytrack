<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Academies Unosquare</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎯</text></svg>">
<link rel="stylesheet" href="/styles.css">
</head>
<body>

<div class="toast" id="toast"></div>

<!-- Module-completion celebration -->
<div class="congrats-overlay" id="congratsOverlay" onclick="if(event.target===event.currentTarget)closeCongrats()">
  <div class="congrats-modal" id="congratsModal">
    <div class="congrats-icon" id="congratsIcon"></div>
    <div class="congrats-title" id="congratsTitle"></div>
    <div class="congrats-sub" id="congratsSub"></div>
    <div class="congrats-badge" id="congratsBadge"></div>
    <div style="margin-top:24px">
      <button class="btn btn-primary" onclick="closeCongrats()">Keep Going!</button>
    </div>
  </div>
</div>

<!-- Generic modal host (login-gated forms rendered here by app.js) -->
<div class="modal-overlay" id="modalRoot" onclick="if(event.target===event.currentTarget)closeModal()">
  <div class="modal" id="modalBody"></div>
</div>

<nav class="nav">
  <div class="nav-logo">
    <span class="brand">ACADEMY</span>
    <span class="subtitle" style="font-size:14px;font-weight:600;color:var(--text-muted)">Unosquare</span>
  </div>
  <div class="nav-actions" id="navActions"></div>
</nav>

<div id="app">
  <div class="spinner">Loading…</div>
</div>

<script src="/app.js"></script>
</body>
</html>
